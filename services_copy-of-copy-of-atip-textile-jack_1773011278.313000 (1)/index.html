    <script>
      // Workaround for Square SDK fetch polyfill issue in restricted environments
      (function() {
        try {
          if (window.fetch && !Object.getOwnPropertyDescriptor(window, 'fetch')?.writable) {
            const originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              value: function() { return originalFetch.apply(this, arguments); },
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn("Square fetch workaround failed:", e);
        }
      })();
    </script>
    <script src="https://web.squarecdn.com/v1/square.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'background': 'var(--color-background)',
              'title': 'var(--color-title)',
              'subtitle': 'var(--color-subtitle)',
              'red-button': 'var(--color-red-button)',
              'black-button': 'var(--color-black-button)',
              'black-button-text': 'var(--color-black-button-text)',
            },
            fontFamily: {
              'aboreto': ['Aboreto', 'cursive'],
              'playfair': ['"Playfair Display"', 'serif'],
              'montserrat': ['Montserrat', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fade-in 0.5s ease-out forwards',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --color-background: #FFF9EE;
        --color-background-end: #EFE5D5;
        --color-title: #616b53;
        --color-subtitle: #3d3d3d;
        --color-red-button: #c47e55;
        --color-black-button: #EAE0D5;
        --color-black-button-text: #594a4a;
      }

      .dark {
        --color-background: #1a2a2a;
        --color-background-end: #0d1515;
        --color-title: #FFE6B8;
        --color-subtitle: #e5dfd3;
        --color-red-button: #d98e65;
        --color-black-button: #403636;
        --color-black-button-text: #FFF9EE;
      }

      body {
        background-color: var(--color-background);
        background-image: linear-gradient(to bottom, var(--color-background), var(--color-background-end));
        background-attachment: fixed;
        color: var(--color-subtitle);
        font-family: 'Montserrat', sans-serif;
        transition: background-color 0.3s ease, color 0.3s ease;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      ::selection {
        background: var(--color-red-button);
        color: white;
      }

      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .animate-fade-in { 
        animation: fade-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        opacity: 0;
      }

      .stagger-1 { animation-delay: 0.15s; }
      .stagger-2 { animation-delay: 0.3s; }
      
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-title);
        opacity: 0.3;
        border-radius: 10px;
      }
    </style>
